<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mi Novio Hermoso 🤍</title>
<link rel="icon" type="image/png" href="M18.PNG">

<style>
body{
margin:0;
padding:0;
height:100vh;
background: linear-gradient(135deg, #f8bcd0, #fcd6e6);
font-family: 'Georgia', serif;
text-align:center;
overflow:hidden;
}

/* Pantalla inicio */
#inicio{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
color:white;
background: linear-gradient(135deg, #f8bcd0, #fcd6e6);
cursor:pointer;
z-index:10;
animation: fadeIn 2s ease-in-out;
}

/* Contenido oculto */
#contenido{
display:none;
}

h1{
margin-top:50px;
font-size:70px;
color:white;
letter-spacing:8px;
text-shadow: 2px 2px 15px rgba(0,0,0,0.3);
animation: fadeIn 2s ease-in-out;
}

.contenedor{
margin-top:30px;
animation: fadeIn 3s ease-in-out;
}

img{
width:320px;
height:420px;
object-fit:cover;
border-radius:25px;
box-shadow:0px 15px 35px rgba(0,0,0,0.25);
transition:0.5s;
}

button{
margin-top:25px;
font-size:45px;
background:none;
border:none;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.3);
}

p{
color:white;
font-size:22px;
margin-top:20px;
text-shadow: 1px 1px 10px rgba(0,0,0,0.3);
}

/* Botón música */
.boton-musica{
display:inline-block;
margin-top:20px;
padding:12px 25px;
font-size:18px;
color:white;
background: rgba(255,255,255,0.2);
border: 2px solid white;
border-radius:30px;
text-decoration:none;
backdrop-filter: blur(5px);
transition:0.3s;
}

.boton-musica:hover{
background:white;
color:#d63384;
transform:scale(1.05);
}

/* Animaciones */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* Corazones */
.corazon{
position:absolute;
color:white;
animation: flotar linear forwards;
opacity:0.8;
}

@keyframes flotar{
0%{
transform:translateY(100vh);
opacity:0;
}
30%{
opacity:0.8;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}
</style>
</head>

<body>

<div id="inicio" onclick="mostrarContenido()">
Toca la pantalla si me amas 🤍
</div>

<div id="contenido">
<h1>TE AMO</h1>

<div class="contenedor">
<img id="foto" src="M9.PNG">
<br>
<button onclick="cambiarFoto()">🤍</button>
<p>Te amo mi pilotito hermoso✨</p>

<br>
<a href="https://youtu.be/F_AGC1W_aJk?si=-vijNfQPpc4aY89w" target="_blank" class="boton-musica">
🎶 Nuestra canción
</a>
</div>
</div>

<script>
const fotos = [
"M1.PNG",
"M2.PNG",
"M3.PNG",
"M4.PNG",
"M5.PNG",
"M6.PNG",
"M7.PNG",
"M8.PNG",
"M9.PNG",
"M10.PNG",
"M11.PNG",
"M12.PNG",
"M13.PNG",
"M14.PNG",
"M15.PNG",
"M16.PNG",
"M17.PNG"
];

let indice = 0;
let corazonesActivos = false;

function cambiarFoto(){
indice++;
if(indice >= fotos.length){
indice = 0;
}
document.getElementById("foto").src = fotos[indice];
}

function mostrarContenido(){
document.getElementById("inicio").style.display="none";
document.getElementById("contenido").style.display="block";

if(!corazonesActivos){
corazonesActivos = true;
setInterval(crearCorazon, 400);
}
}

function crearCorazon(){
const corazon = document.createElement("div");
corazon.innerHTML = "♡";
corazon.style.position = "fixed";
corazon.style.left = Math.random() * 100 + "vw";
corazon.style.bottom = "-20px";
corazon.style.fontSize = (Math.random() * 20 + 15) + "px";
corazon.style.color = "white";
corazon.style.opacity = "0.8";
corazon.style.zIndex = "9999";
corazon.style.pointerEvents = "none";
corazon.style.transition = "transform 6s linear, opacity 6s linear";

document.body.appendChild(corazon);

setTimeout(() => {
corazon.style.transform = "translateY(-110vh)";
corazon.style.opacity = "0";
}, 50);

setTimeout(() => {
corazon.remove();
}, 6000);
}
</script>

</body>

</html>
